  /* 한글: Pretendard Medium(500)을 한글 영역에만 적용, 영문보다 살짝 작게. 로컬 파일, 없으면 Apple SD Medium 폴백 */
  @font-face{
  font-family:"KoKR";
  src:url("Pretendard-Medium.woff2") format("woff2"),
      local("Apple SD Gothic Neo Medium"), local("AppleSDGothicNeo-Medium");
  font-weight:400; font-style:normal; font-display:swap;
  size-adjust:94%;
  unicode-range:U+1100-11FF, U+3130-318F, U+AC00-D7A3, U+A960-A97F, U+D7B0-D7FF;
  }

  :root{
    --bg:#ffffff;
    --ink:#111111;
    --soft:#8a8a8a;
    --line:#ececec;
    --hover:#c0392b;
    --sidebar:158px;
    --fs:14px;
    --menu:12px;          /* 메뉴 글자 크기 (모든 메뉴 항목 동일, 모바일·웹 공통) */
    --font:"TWK Lausanne","KoKR","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{ -webkit-font-smoothing:antialiased; }
  body{ background:var(--bg); color:var(--ink); font-family:var(--font); font-size:var(--fs); line-height:1.55; }
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}
  /* en-dash(–): 앞뒤 자간 8부(0.08em) + 기준선 0.25pt 위로 (InDesign 자간·기준선 이동) */
  .endash{ margin:0 .08em; position:relative; top:-0.25pt; }

  /* ───────── 왼쪽 인덱스 ───────── */
  .sidebar{
    position:sticky; top:0; align-self:flex-start; height:100vh; flex:0 0 var(--sidebar); width:var(--sidebar);
    padding:30px 20px 30px 28px; display:flex; flex-direction:column;  /* 왼쪽 마진 (오른쪽 20 유지 → 이미지와의 간격 동일) */
    background:var(--bg); z-index:20;
    overflow-y:auto;
  }
  /* Heechan Lee — 나머지 메뉴와 동일한 서체 위계, 아래 콘텐츠와 간격 */
  .brand{ font-size:var(--menu); font-weight:400; letter-spacing:.01em; line-height:1.4; margin:0 0 8px; padding:3px 0; cursor:pointer; }
  .brand:hover{ text-decoration:underline; text-underline-offset:3px; }
  .brand.active{ text-decoration:underline; text-underline-offset:3px; }

  /* 메뉴 — 연도/프로젝트/Info/Contact 모두 같은 크기·색·간격, 들여쓰기 없음 */
  .index{ display:flex; flex-direction:column; }
  .index .year,
  .index button,
  .index a{
    display:block;                                /* 한 줄 전체 사용 */
    font-size:var(--menu); color:var(--ink);
    text-transform:none; letter-spacing:.01em; line-height:1.4;
    background:none; border:0; font-family:inherit; text-align:left;
    padding:3px 0;                                /* 들여쓰기 없음, 균일 간격 */
    white-space:normal; word-break:keep-all;      /* 줄바꿈 허용 → 글이 잘리지 않음 */
  }
  .index button, .index a{ cursor:pointer; transition:color .15s; }
  .index .year{ cursor:default; }                 /* 연도: 클릭 불가 라벨 */
  .index button:hover, .index a:hover{ text-decoration:underline; text-underline-offset:3px; }
  .index button.active{ text-decoration:underline; text-underline-offset:3px; }   /* 선택/호버: 검정 + 밑줄 */
  /* Information은 프로젝트 개수와 무관하게 항상 마지막 프로젝트보다 한 줄 아래 */
  .index .info-btn{ margin-top:calc(var(--menu) * 0.6 + 4px); }

  .sidebar .foot{ margin-top:auto; padding-top:30px; color:var(--soft); font-size:11.5px; }

  /* ───────── 본문 ───────── */
  main{ flex:1; min-width:0; padding:30px 34px 80px 12px; }  /* 왼쪽 여백 축소 → 네비게이터와 이미지 간격 좁힘 */
  /* 제목을 사이드바의 Heechan Lee와 같은 라인·리듬으로 (박스 모델 동일) */
  .proj-title{ font-size:var(--menu); font-weight:400; letter-spacing:.01em;
               line-height:1.4; color:var(--ink); margin:0 0 11px; padding:3px 0;
               white-space:pre-line; max-width:560px; }  /* 제목: Heechan Lee 라인에 정렬 */
  .proj-desc{ font-size:var(--menu); font-weight:400; letter-spacing:.01em;
               line-height:1.4; color:var(--ink); padding:3px 0;
               white-space:pre-line; max-width:560px; }  /* 설명: Information 라인에 정렬 */

  #view-work{ display:block; }
  /* 세부 페이지: 왼쪽 = 설명(고정/sticky), 오른쪽 = 스크롤되는 이미지 열 */
  .proj-layout{ display:flex; align-items:flex-start; gap:40px; }
  .proj-info{ position:sticky; top:30px; align-self:flex-start; flex:0 0 auto; width:44%; max-width:560px; display:flex; flex-direction:column; }
  .proj-images{ flex:1 1 0; min-width:0; }
  .work-grid{ display:flex; flex-direction:column; gap:44px; align-items:flex-start; }
  /* 이미지 아래 외부 링크 (예: 애플 뮤직 플레이리스트) */
  .proj-links{ display:flex; flex-direction:column; align-items:flex-start; gap:6px; margin-top:44px; }
  .proj-link{ font-size:var(--menu); letter-spacing:.01em; color:var(--ink); text-decoration:none; }
  .proj-link:hover{ text-decoration:underline; text-underline-offset:3px; }
  /* 설명 텍스트 안의 링크 */
  .text-link{ color:var(--ink); text-decoration:underline; text-underline-offset:3px; }
  /* 세부 설명 괄호 간격: ( 안쪽 8부, ) 바깥쪽 8부 */
  .paren-open{ margin:0 .08em; }
  .paren-close{ margin:0 .08em; }
  .text-link:hover{ opacity:.6; }
  .work{ cursor:zoom-in; width:100%; max-width:760px; }
  .work .frame{ overflow:hidden; background:#f4f4f4; }
  .work img{ display:block; width:100%; height:auto; }
  .work .ph{ width:100%; aspect-ratio:4/5; display:flex; align-items:flex-end;
             padding:12px; color:#fff; font-size:12px; letter-spacing:.05em; }
  .work .cap{ margin-top:7px; font-size:11.5px; color:var(--soft); letter-spacing:.02em; }
  .work .cap b{ color:var(--ink); font-weight:500; }
  /* 좁은 화면: 설명 고정을 풀고 이미지를 그 아래로 쌓음 */
  @media (max-width:820px){
    .proj-layout{ flex-direction:column; gap:22px; }
    .proj-info{ position:static; width:auto; max-width:560px; }
  }

  /* ───────── Home 갤러리 ─────────
     세부 페이지(프로젝트)의 대표 이미지를 한눈에 보여주는 첫 화면.
     작업 페이지와 동일한 justified-rows 방식 → 원본 비율 유지, 한 줄 높이 통일. */
  #view-home{ display:none; }
  .home-grid{ display:flex; flex-wrap:wrap; gap:22px; align-items:flex-start; }
  .home-grid::after{ content:""; flex-grow:1000000; }   /* 마지막 줄 과확대 방지 */
  .home-card{ cursor:pointer; flex:1 1 280px; }
  .home-card .frame{ overflow:hidden; background:#f4f4f4; }
  .home-card img{ display:block; width:100%; height:auto; transition:opacity .15s; }
  .home-card:hover img{ opacity:.84; }
  .home-card .ph{ width:100%; aspect-ratio:4/5; display:flex; align-items:flex-end;
                  padding:12px; color:#fff; font-size:12px; letter-spacing:.05em; }
  .home-card .ph.video{ align-items:center; justify-content:center; font-size:26px; color:rgba(255,255,255,.85); }
  .home-card .home-cap{ margin-top:7px; font-size:11.5px; color:var(--soft); letter-spacing:.02em; transition:color .15s; }
  .home-card:hover .home-cap{ color:var(--ink); }

  /* 프로젝트 영상 (Vimeo 등) — 16:9 반응형 임베드 */
  .proj-video{ margin:0 0 22px; }
  .proj-video .vwrap{ position:relative; width:100%; aspect-ratio:16/9; background:#000; }
  .proj-video iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }

  /* INFO 뷰 */
  #view-info{ max-width:560px; display:none; line-height:1.4; font-size:12px; padding-top:3px; }  /* Info 페이지는 본문보다 작게. 상단 3px → About을 Heechan Lee 라인에 맞춤 */
  #view-info .blk{ margin-bottom:15px; }
  /* 큰 주제 — 본문과 동일한 서체 위계. 라인은 주제에 바짝 붙임 */
  #view-info h2{
    font-size:inherit; font-weight:400; color:var(--ink);
    text-transform:none; letter-spacing:0; line-height:1.3; margin:0 0 7px;
    /* 소제목→본문 간격을 네비게이터 행간과 동일하게(약 +3px). 글자에만 밑줄 */
    display:inline-block;
    text-decoration:underline; text-underline-offset:3px; text-decoration-thickness:1px;
  }
  #view-info p{ margin:0; line-height:1.4; }
  #view-info p + p{ margin-top:5px; }
  /* '/' 앞뒤 간격(인디자인 8부 ≈ 0.08em) */
  .slash{ margin:0 .08em; }
  /* Experience: 연도 칸 + 내용 칸 (탭처럼 분리·정렬) */
  #view-info p.exp{ display:flex; gap:14px; }
  #view-info p.exp .exp-yr{ flex:0 0 78px; }
  #view-info p.exp .exp-t{ flex:1 1 auto; }
  #view-info a.link{ color:var(--ink); text-decoration:none; }
  #view-info a.link:hover{ text-decoration:underline; text-underline-offset:3px; }
  #view-info .copyright{ color:var(--soft); margin-top:22px; }

  /* 라이트박스 */
  #lightbox{ position:fixed; inset:0; background:#000;
             display:flex; align-items:center; justify-content:center; z-index:60; padding:40px;
             opacity:0; visibility:hidden; pointer-events:none; transition:opacity .28s ease, visibility .28s; }
  #lightbox.open{ opacity:1; visibility:visible; pointer-events:auto; }
  #lightbox figure{ max-width:90vw; max-height:90vh; text-align:center; cursor:zoom-out; }
  #lightbox img{ max-width:88vw; max-height:88vh; width:auto; margin:0 auto; }
  #lightbox figcaption{ margin-top:12px; font-size:12px; color:#999; }

  /* 닫기 X(오른쪽 위) + 양옆 이전/다음 꺽쇠 */
  .lb-close{ position:absolute; top:22px; right:26px; width:34px; height:34px; padding:0;
             border:0; background:none; color:#999; cursor:pointer; transition:color .15s; z-index:2; }
  .lb-close svg{ width:100%; height:100%; stroke-linecap:round; }
  .lb-nav{ position:absolute; top:0; bottom:0; width:22%; border:0; background:none;
           color:#999; cursor:pointer; transition:color .15s; display:flex; align-items:center; }
  .lb-nav svg{ width:26px; height:auto; stroke-linecap:round; stroke-linejoin:round; }
  /* 선 두께를 화면 픽셀 기준으로 고정 → 꺽쇠와 X 두께 동일 */
  #lightbox svg line, #lightbox svg polyline{ vector-effect:non-scaling-stroke; }
  .lb-close:hover, .lb-nav:hover{ color:#fff; }
  .lb-prev{ left:0; justify-content:flex-start; padding-left:30px; }
  .lb-next{ right:0; justify-content:flex-end; padding-right:30px; }

  /* ───────── 반응형 ─────────
     별도의 분기점(breakpoint) 없이, 폭이 좁아지면 그리드 열 개수만
     자연스럽게 줄도록 유지. 여백·간격·사이드바는 모든 폭에서 동일 →
     화면을 줄여도 풀 화면 상태가 최대한 유지됨. */

  /* ───────── 히어로 인트로 (고정 배경) ───────── */
  #hero{ position:fixed; inset:0; width:100%; height:100vh; z-index:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--bg); text-align:center; padding:24px; }
  #hero h1{ font-family:"Heechan",var(--font); font-weight:400;
    font-size:clamp(46px,15.5vw,300px); line-height:0.9; letter-spacing:-0.005em;
    color:var(--ink); margin:0; user-select:none; }
  #hero .hero-img{ width:min(92vw,1240px); height:auto; max-height:84vh;
    object-fit:contain; user-select:none; -webkit-user-drag:none; }
  .hero-scroll{ position:absolute; bottom:calc(5.2vh + 20px); left:50%; transform:translateX(-50%);
    font-family:var(--font); font-size:var(--menu); letter-spacing:.01em; color:var(--ink);
    cursor:pointer; }
  .hero-scroll:hover{ text-decoration:underline; text-underline-offset:3px; }

  /* 고정 히어로를 드러내는 빈 공간(스페이서) — 마진 상쇄 방지 */
  .hero-spacer{ height:100vh; width:100%; }
  /* 콘텐츠 시트 — 고정된 히어로 위로 스크롤되어 올라옴 */
  .sheet{ position:relative; z-index:5; min-height:100vh;
    background:var(--bg); display:flex; align-items:flex-start; box-shadow:0 -10px 30px rgba(0,0,0,.05); }

  /* 사이드바: 시트가 덮일 때 함께 나타남 */
  .sidebar{ z-index:20; }

  /* 세부 페이지(프로젝트/Info): 히어로 인트로 비활성화 — 위로 올려도 랜딩이 안 뜸 */
  body.detail #hero{ display:none; }
  body.detail .hero-spacer{ height:0; }

  body.intro-done #hero{ display:none; }
  body.intro-done .hero-spacer{ height:0; }
  body.intro-done .sidebar{ opacity:1 !important; pointer-events:auto !important; }

/* ──────── 이하 렌더링 (수정 불필요) ──────── */
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// 본문 텍스트용: 이스케이프 + en-dash(–) 앞뒤에 자간(8부=0.08em) 부여 (InDesign 자간처럼)
const fmt = s => {
  let t = esc(s).replace(/\u2013/g, '<span class="endash">\u2013</span>');
  // 마크다운 링크 [라벨](url) → 클릭 가능한 링크
  t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a class="text-link" href="$2" target="_blank" rel="noopener">$1 ↗</a>');
  return t;
};
// 세부 설명 전용: 괄호 간격 — '(' 안쪽 8부, ')' 바깥쪽 8부 (태그 안쪽은 제외)
const fmtDesc = s => fmt(s).split(/(<[^>]*>)/).map(part =>
  part.charAt(0)==='<' ? part
    : part.replace(/\(/g,'<span class="paren-open">(</span>').replace(/\)/g,'<span class="paren-close">)</span>')
).join('');

// 프로젝트를 평탄화 + 사이드바 생성
const flat = [];
let nav = "";
// flat 배열만 채우고(홈/라이트박스/세부페이지에서 사용), 사이드바에는 항목을 표시하지 않음
PROJECTS.forEach(group=>{ group.items.forEach(p=>{ if(p.year==null) p.year=group.year; flat.push(p); }); });

// 프로젝트 제목 → URL 슬러그 (예: "Drawing In Transit" → "drawing-in-transit")
function slugify(t){
  return String(t||'')
    .trim().toLowerCase()
    .replace(/['"’]/g,'')          // 따옴표 제거
    .replace(/[^a-z0-9]+/g,'-')    // 그 외 문자는 하이픈으로
    .replace(/^-+|-+$/g,'');       // 양끝 하이픈 정리
}
const slugOf = [];      // pi → slug
const slugToPi = {};    // slug → pi
flat.forEach((p,pi)=>{
  let base = slugify(p.title) || ('p'+pi);   // 영문이 없으면 p{번호}로 대체
  let s = base, n = 2;
  while(slugToPi[s]!==undefined){ s = base+'-'+n; n++; }   // 중복 제목 구분
  slugOf[pi] = s;
  slugToPi[s] = pi;
});

// justified-rows 목표 행 높이(px). 한 줄 안의 이미지들이 이 높이에 맞춰 정렬됨.
const ROW_HEIGHT = 320;

function applyGridLayout(){
  workEl.querySelectorAll('.work').forEach(fig=>{
    const setAR = (ar)=>{
      if(!ar || !isFinite(ar)) ar = 0.8;
      fig.style.flexGrow  = ar;
      fig.style.flexBasis = (ar * ROW_HEIGHT) + 'px';
    };
    const img = fig.querySelector('img');
    if(img){
      if(img.complete && img.naturalWidth) setAR(img.naturalWidth / img.naturalHeight);
      else img.addEventListener('load', ()=>setAR(img.naturalWidth / img.naturalHeight), {once:true});
    } else {
      setAR(0.8); // 플레이스홀더(4:5)
    }
  });
}

function renderProject(pi){
  const p = flat[pi];
  const videoBlock = p.video
    ? `<div class="proj-video"><div class="vwrap"><iframe src="${esc(p.video)}" `
      + `allow="autoplay; fullscreen; picture-in-picture" allowfullscreen `
      + `referrerpolicy="strict-origin-when-cross-origin"></iframe></div></div>`
    : '';
  const links = Array.isArray(p.links) ? p.links : (p.link ? [p.link] : []);
  const linkBlock = links.length
    ? `<div class="proj-links">` + links.map(l=>{
        const url = (typeof l==="string") ? l : (l.url||"");
        const label = (l && l.label) ? l.label : url.replace(/^https?:\/\//,"").replace(/\/.*$/,"");
        return `<a class="proj-link" href="${esc(url)}" target="_blank" rel="noopener">${esc(label)} ↗</a>`;
      }).join("") + `</div>`
    : "";
  workEl.innerHTML =
    `<div class="proj-layout">` +
    `<div class="proj-info"><div class="proj-title">${esc(p.title || '')}${p.year ? ', ' + esc(p.year) : ''}</div>` +
    `<div class="proj-desc">${fmtDesc(p.desc || '')}</div></div>` +
    `<div class="proj-images">` +
    videoBlock +
    `<div class="work-grid">` +
    p.works.map((w,i)=>{
      const media = w.src
        ? `<img src="${esc(w.src)}" alt="${esc(w.title)}" loading="lazy">`
        : `<div class="ph" style="background:linear-gradient(135deg, ${w.c||'#ccc'}, #00000022)"></div>`;
      return `<figure class="work" data-pi="${pi}" data-wi="${i}">
                <div class="frame">${media}</div>
              </figure>`;
    }).join('') +
    `</div>` +
    linkBlock +
    `</div>` +
    `</div>`;
  homeEl.style.display='none';
  workEl.style.display=''; document.body.classList.add('detail');
  infoEl.style.display='none';
  __navScroll();
  alignProjInfo();
  setTimeout(alignProjInfo, 80);
  workEl.querySelectorAll('img').forEach(img=>{ if(!img.complete) img.addEventListener('load', alignProjInfo, {once:true}); });
}

/* 세부 설명(proj-desc)의 시작 높이를 사이드바 'Information' 줄에 맞춤
   (제목 proj-title은 자연히 'Heechan Lee'와 같은 상단 라인에 정렬됨) */
function alignProjInfo(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const desc = workEl.querySelector('.proj-desc');
    const info = document.querySelector('.index .info-btn');
    if(!desc || !info) return;
    const pinfo = desc.closest('.proj-info');
    const sbar  = info.closest('.sidebar');
    // 측정 동안만 sticky 해제 → clamp 없는 실제 레이아웃 위치로 정렬
    const sp = pinfo ? pinfo.style.position : '';
    const ss = sbar  ? sbar.style.position  : '';
    if(pinfo) pinfo.style.position = 'static';
    if(sbar)  sbar.style.position  = 'static';
    desc.style.marginTop = '0px';
    const m = info.getBoundingClientRect().top - desc.getBoundingClientRect().top;
    desc.style.marginTop = m + 'px';
    if(pinfo) pinfo.style.position = sp;
    if(sbar)  sbar.style.position  = ss;
  }));
}
// 웹폰트 로드/리사이즈 후 내비 높이가 바뀌면 다시 정렬

const HOME_ROW_HEIGHT = 330;   // 홈 썸네일 한 줄 목표 높이(px). 클수록 이미지가 커지고 한 줄 개수가 줄어듦.

// 각 프로젝트의 대표(커버) 이미지: cover 인덱스가 지정돼 있으면 그것을, 없으면 첫 이미지를 사용.
function homeTiles(p){
  const works = p.works || [];
  const tiles = [];
  // 새 형식: 선택 이미지(home) + 업로드 썸네일(thumbs) — 합쳐서 최대 5개
  if(Array.isArray(p.home)) p.home.forEach(i=>{ if(works[i] && works[i].src) tiles.push({ src:works[i].src }); });
  if(Array.isArray(p.thumbs)) p.thumbs.forEach(s=>{ if(s) tiles.push({ src:s }); });
  if(tiles.length) return tiles.slice(0,5);
  // 옛 형식 호환 (단일 대표)
  if(p.thumb) return [{ src:p.thumb }];
  if(Number.isInteger(p.cover) && works[p.cover] && works[p.cover].src) return [{ src:works[p.cover].src }];
  const withSrc = works.find(w=>w.src);
  if(withSrc) return [{ src:withSrc.src }];
  if(works.length) return [{ c:works[0].c }];
  return [{ video:true }];   // 이미지 없음 (영상 전용 등)
}

function renderHome(){
  homeEl.innerHTML =
    `<div class="home-grid">` +
    flat.map((p,pi)=>{
      return homeTiles(p).map(t=>{
        let media;
        if(t.src){
          media = `<img src="${esc(t.src)}" alt="${esc(p.title)}" loading="lazy">`;
        } else if(t.c){
          media = `<div class="ph" style="background:linear-gradient(135deg, ${t.c||'#ccc'}, #00000022)"></div>`;
        } else {
          media = `<div class="ph video" style="background:linear-gradient(135deg,#3a3a3a,#0a0a0a)">▶</div>`;
        }
        return `<div class="home-card" data-pi="${pi}">
                  <div class="frame">${media}</div>
                </div>`;
      }).join('');
    }).join('') +
    `</div>`;
  homeEl.style.display='block'; document.body.classList.remove('detail');
  workEl.style.display='none';
  infoEl.style.display='none';
  applyHomeLayout();
  __navScroll();
}

function applyHomeLayout(){

// ───────── 화면 전환 + 브라우저 히스토리 ─────────
function hashFor(state){
  if(!state || state.view==='home') return '#';
  if(state.view==='info') return '#about';
  return '#' + (slugOf[state.pi] || ('p'+state.pi));
}
function applyState(state){
  // 홈이 아닌 화면을 한 번이라도 열면 인트로는 끝난 것으로 간주
  if(state.view==='project' || state.view==='info'){
    window.__afterIntro = true;
    document.body.classList.add('intro-done');
  }
  buttons.forEach(x=>x.classList.remove('active'));
  brandEl.classList.remove('active');
  if(state.view==='info'){
    const btn = buttons.find(b=>b.dataset.info);
    if(btn) btn.classList.add('active');
    renderInfo();
  } else if(state.view==='project'){
    const btn = buttons.find(b=>!b.dataset.info && +b.dataset.pi===state.pi);
    if(btn) btn.classList.add('active');
    renderProject(state.pi);
  } else {
    brandEl.classList.add('active');
    renderHome();
  }
}
// push=true: 새 히스토리 항목 추가(뒤로가기로 돌아올 수 있게)
function navTo(state, push){
  applyState(state);
  if(push !== false) history.pushState(state, '', hashFor(state));
}
// 브라우저/휴대폰 뒤로·앞으로 가기
window.addEventListener('popstate', e=>{
  applyState(e.state || {view:'home'});
});

// 홈 썸네일 클릭 → 해당 프로젝트 세부 페이지 열기
homeEl.addEventListener('click', e=>{
  const card = e.target.closest('.home-card'); if(!card) return;
  navTo({view:'project', pi:+card.dataset.pi});
});

const igLabel = INFO.instagramLabel || INFO.instagram;
const infoBlocks = [
  { h:"About", body: INFO.about.map(p=>`<p>${fmt(p)}</p>`).join('') },
  { h:"Services", body:`<p>${fmt(INFO.skills.join(', '))}</p>` },
  ...((INFO.experience && INFO.experience.length)
      ? [{ h:"Experience", body: INFO.experience.map(x=>{
          const m = String(x).match(/^(\S+)([\s\S]*)$/);     // 맨 앞 토큰(연도) + 나머지
          if(m && /\d/.test(m[1])){
            const yr = m[1], t = m[2].replace(/^\s+/, '');
            return `<p class="exp"><span class="exp-yr">${fmt(yr)}</span><span class="exp-t">${fmt(t).replace(/\//g,"<span class=\"slash\">/</span>")}</span></p>`;
          }
          return `<p class="exp"><span class="exp-yr"></span><span class="exp-t">${fmt(x).replace(/\//g,"<span class=\"slash\">/</span>")}</span></p>`;

      : []),

// 사이드바 'Heechan Lee' 클릭 → Home 갤러리로

// 기본 화면: URL 해시(#about, #p3 등)에 맞춰 복원, 없으면 Home 갤러리
function stateFromHash(){
  const h = location.hash;
  if(h === '#about') return {view:'info'};
  const key = decodeURIComponent(h.replace(/^#/, ''));
  if(slugToPi[key] !== undefined) return {view:'project', pi: slugToPi[key]};
  const m = h.match(/^#p(\d+)$/);   // 옛 #p0 형식도 계속 지원
  if(m){ const pi = +m[1]; if(flat[pi]) return {view:'project', pi}; }
  return {view:'home'};
}
const __initState = stateFromHash();
history.replaceState(__initState, '', hashFor(__initState));
applyState(__initState);

// 라이트박스 — 검정 배경, 양옆 화살표로 이전/다음
const LIGHTBOX_CAPTION = false;   // 캡션 표시: 나중에 필요하면 true 로 바꾸세요
const lb = document.getElementById('lightbox');
const lbFig = lb.querySelector('figure');
let lbPi = 0, lbWi = 0;

function lbRender(){
  const w = flat[lbPi].works[lbWi];
  const media = w.src
    ? `<img src="${esc(w.src)}" alt="${esc(w.title)}">`
    : `<div class="ph" style="background:linear-gradient(135deg, ${w.c||'#ccc'}, #00000022)"></div>`;
  const cap = LIGHTBOX_CAPTION ? `<figcaption>${esc(w.title)} · ${esc(w.year)}</figcaption>` : '';
  lbFig.innerHTML = media + cap;
}
function lbStep(d){
  const n = flat[lbPi].works.length;
  lbWi = (lbWi + d + n) % n;   // 프로젝트 안에서 순환
  lbRender();
}
function lbOpen(pi, wi){ lbPi = pi; lbWi = wi; lbRender(); lb.classList.add('open'); }
function lbClose(){ lb.classList.remove('open'); }

workEl.addEventListener('click', e=>{
  const fig = e.target.closest('.work'); if(!fig) return;
  lbOpen(+fig.dataset.pi, +fig.dataset.wi);
});
lb.querySelector('.lb-close').addEventListener('click', e=>{ e.stopPropagation(); lbClose(); });
lb.querySelector('.lb-prev').addEventListener('click', e=>{ e.stopPropagation(); lbStep(-1); });
lb.querySelector('.lb-next').addEventListener('click', e=>{ e.stopPropagation(); lbStep(1); });
lb.addEventListener('click', lbClose);   // 배경/이미지 클릭 시 닫기
document.addEventListener('keydown', e=>{
  if(!lb.classList.contains('open')) return;
  if(e.key==='Escape') lbClose();
  else if(e.key==='ArrowLeft') lbStep(-1);
  else if(e.key==='ArrowRight') lbStep(1);
});

/* ───────── 히어로 인트로 동작 ───────── */
(function(){
  // 뒤로/앞으로 이동 시 브라우저가 멋대로 스크롤을 복원하지 않도록(우리가 직접 제어)
  if('scrollRestoration' in history) history.scrollRestoration = 'manual';
  var hero=document.getElementById('hero');
  if(!hero) return;
  // 첫 스크롤 단계: 인트로를 지났다는 '표시'만 (히어로는 그대로 두고 부드럽게 덮이게)
  function markAfterIntro(){ window.__afterIntro=true; }
  // 실제로 히어로를 끄는 단계: 세부 페이지로 이동/복귀 시에만 (홈은 곧장 갤러리)
  function dismiss(){
    window.__afterIntro=true;
    document.body.classList.add('intro-done');
  }
  // 네비게이션/브랜드 클릭 시 인트로 종료(캡처 단계 → 렌더보다 먼저 실행)
  document.querySelectorAll('.index button, #brandHome').forEach(function(el){
    el.addEventListener('click', dismiss, true);
  });
  function upd(){
    // 시트가 화면을 거의 다 덮었을 때만 내비게이션 표시
    if(window.scrollY < window.innerHeight*0.9){ document.body.classList.add('hero-on'); }
    else { document.body.classList.remove('hero-on'); }
    if(window.scrollY >= window.innerHeight*0.5){ markAfterIntro(); }
  }
  window.addEventListener('scroll', upd, {passive:true});
  window.addEventListener('resize', upd);
  upd();
  var s=hero.querySelector('.hero-scroll');
  if(s) s.addEventListener('click', function(){
    markAfterIntro();
    window.scrollTo({top:window.innerHeight, behavior:'smooth'});
  });
})();
